# This rule is not used by the project kubequant itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to controller.kubequant.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kubequant
    app.kubernetes.io/managed-by: kustomize
  name: kubequantpodresource-viewer-role
rules:
- apiGroups:
  - controller.kubequant.com
  resources:
  - kubequantpodresources
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - controller.kubequant.com
  resources:
  - kubequantpodresources/status
  verbs:
  - get
