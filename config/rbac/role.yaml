---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - controller.kubequant.com
  resources:
  - kubequantrecommendations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - controller.kubequant.com
  resources:
  - kubequantrecommendations/finalizers
  verbs:
  - update
- apiGroups:
  - controller.kubequant.com
  resources:
  - kubequantrecommendations/status
  verbs:
  - get
  - patch
  - update
